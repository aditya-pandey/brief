name: Generate Static Pages (SSG)

on:
  push:
    paths:
      - "data/*.json"

permissions:
  contents: write

jobs:
  build-ssg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run ssg
      - name: Commit & push SSG assets
        run: |
          git config user.name "briefing-bot"
          git config user.email "actions@github.com"
          git add og-images/ story/ day/
          if git diff --staged --quiet; then
            echo "No SSG changes to commit."
          else
            git commit -m "Auto-generate SSG assets [skip ci]"
            git push
          fi
