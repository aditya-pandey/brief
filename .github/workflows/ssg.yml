name: Generate Static Pages (SSG)

on:
  push:
    paths:
      - "data/*.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ssg-build
  cancel-in-progress: false

jobs:
  build-ssg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run ssg
      - name: Commit & push SSG assets
        run: |
          git config user.name "briefing-bot"
          git config user.email "actions@github.com"

          # These are build artifacts, not hand-edited content — if main has
          # moved since checkout (e.g. another publish or SSG run landed),
          # don't try to rebase/merge two different generated trees. Instead,
          # reset to the new tip and regenerate fresh from the latest data,
          # then try the push again. Avoids the conflict entirely.
          max_attempts=5
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Attempt $attempt of $max_attempts"
            git add og-images/ story/ day/ flash/
            if git diff --staged --quiet; then
              echo "No SSG changes to commit."
              exit 0
            fi

            git commit -m "Auto-generate SSG assets [skip ci]"

            if git push origin main; then
              echo "Pushed successfully."
              exit 0
            fi

            echo "Push rejected — main has moved. Resetting to latest and regenerating."
            git fetch origin main
            git reset --hard origin/main
            npm run ssg
            attempt=$((attempt + 1))
          done

          echo "Failed to push SSG assets after $max_attempts attempts."
          exit 1
