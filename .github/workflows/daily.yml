name: Daily Briefing

# Runs once a day on GitHub's free scheduler, plus a manual "Run workflow" button.
on:
  schedule:
    - cron: "30 1 * * *"      # 01:30 UTC ≈ 07:00 IST
  workflow_dispatch: {}

permissions:
  contents: write              # needed to commit the generated JSON back

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate today's briefing
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          # GEMINI_MODEL: gemini-2.5-flash   # optional override
        run: node pipeline/generate.js

      - name: Commit & push if changed
        run: |
          git config user.name  "briefing-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Briefing: $(date -u +%Y-%m-%d)"
            git push
          fi
