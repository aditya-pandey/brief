name: Import Briefing

# Triggers when you commit a file to inbox/ from the GitHub mobile app
on:
  push:
    paths:
      - "inbox/*.md"
      - "inbox/*.txt"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Find inbox file
        id: find
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD -- 'inbox/*.md' 'inbox/*.txt' | head -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Found: $FILE"

      - name: Import briefing
        run: |
          FILE="${{ steps.find.outputs.file }}"
          if [ -z "$FILE" ]; then
            echo "No inbox file found in last commit — nothing to import."
            exit 0
          fi
          # Extract date from filename (inbox/YYYY-MM-DD.md) or use today
          BASENAME=$(basename "$FILE" .md)
          BASENAME=$(basename "$BASENAME" .txt)
          if echo "$BASENAME" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            DATE="$BASENAME"
          else
            DATE=$(date -u +%Y-%m-%d)
          fi
          echo "Importing $FILE as $DATE..."
          node pipeline/import.js "$DATE" < "$FILE"
          npm run ssg

      - name: Commit & push data
        run: |
          git config user.name  "briefing-bot"
          git config user.email "actions@github.com"
          git add data/ og-images/ story/ day/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Briefing: $(date -u +%Y-%m-%d) (imported from inbox)"
            git push
          fi
