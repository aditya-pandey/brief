  <script>
    const basePath = (() => {
      const path = window.location.pathname;
      const match = path.match(/^(.*?)\/(?:story|day|editor)(?:\/|$)/);
      if (match) return match[1];
      return path.replace(/\/+$/, "");
    })();
    const base = document.createElement('base');
    base.href = basePath ? basePath + '/' : '/';
    document.head.appendChild(base);
  </script>
  <meta name="description" content="Pakistan successfully launched six Chinese-backed Earth-observation satellites into orbit, a development that sharpens the regional space race at a moment when India’s sovereign navigation network, NavIC, faces a prolonged operational crisis. The successful deployment enhances Islamabad's regional surveillance capability while spotlighting New Delhi's struggles to replace its aging space infrastructure. The shifting orbital balance underscores India's urgent need to transition from single-mission state funding to a highly agile, commercially driven space ecosystem capable of sustaining strategic assets." />
